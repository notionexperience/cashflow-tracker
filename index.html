<!DOCTYPE html>
<html lang="en" data-theme="light" data-active-type="Income">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sleek Cashflow Input Pad</title>
<!-- Tailwind CSS for modern layouts -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- Font Awesome Icons for premium look -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root {
    /* Base Color Tokens (Light Mode - Zinc Palette) */
    --text-primary: #09090b;       /* zinc-950 */
    --text-secondary: #71717a;     /* zinc-500 */
    --bg-canvas: #f4f4f5;          /* zinc-100 */
    --bg-card: #ffffff;            /* pure white */
    --bg-inset: #e4e4e7;           /* zinc-200 */
    --border-color: #e4e4e7;       /* zinc-200 */
    --input-bg: #fafafa;           /* zinc-50 */
    --card-hover: rgba(244, 244, 245, 0.6);
  }
  
  :root[data-theme="dark"] {
    /* Base Color Tokens (Dark Mode) */
    --text-primary: #fafafa;       /* zinc-50 */
    --text-secondary: #a1a1aa;     /* zinc-400 */
    --bg-canvas: #09090b;          /* pitch zinc-950 */
    --bg-card: #18181b;            /* zinc-900 */
    --bg-inset: #27272a;           /* zinc-800 */
    --border-color: #27272a;       /* zinc-800 */
    --input-bg: #09090b;           /* pitch zinc-950 */
    --card-hover: rgba(39, 39, 42, 0.4);
  }

  /* --- Income Emerald State --- */
  :root[data-active-type="Income"] {
    --accent-color: #059669;       /* Emerald-600 */
    --accent-soft: #ecfdf5;        /* Emerald-50 */
    --accent-glow: rgba(5, 150, 105, 0.12);
  }
  :root[data-theme="dark"][data-active-type="Income"] {
    --accent-color: #34d399;       /* Emerald-400 */
    --accent-soft: rgba(52, 211, 153, 0.08);
    --accent-glow: rgba(52, 211, 153, 0.22);
  }

  /* --- Expense Rose State --- */
  :root[data-active-type="Expense"] {
    --accent-color: #e11d48;       /* Rose-600 */
    --accent-soft: #fff1f2;        /* Rose-50 */
    --accent-glow: rgba(225, 29, 72, 0.12);
  }
  :root[data-theme="dark"][data-active-type="Expense"] {
    --accent-color: #fb7185;       /* Rose-400 */
    --accent-soft: rgba(251, 113, 133, 0.08);
    --accent-glow: rgba(251, 113, 133, 0.22);
  }

  /* --- Transfer Indigo State --- */
  :root[data-active-type="Transfer"] {
    --accent-color: #4f46e5;       /* Indigo-600 */
    --accent-soft: #eef2ff;        /* Indigo-50 */
    --accent-glow: rgba(79, 70, 229, 0.12);
  }
  :root[data-theme="dark"][data-active-type="Transfer"] {
    --accent-color: #818cf8;       /* Indigo-400 */
    --accent-soft: rgba(129, 140, 248, 0.08);
    --accent-glow: rgba(129, 140, 248, 0.22);
  }

  body {
    background-color: var(--bg-canvas);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    transition: background-color 0.3s ease, color 0.3s ease;
  }

  /* Premium Glass Cards */
  .premium-card {
    background-color: var(--bg-card);
    border: 1px solid var(--border-color);
    box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.05);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .dynamic-accent-glow {
    box-shadow: 0 0 80px -10px var(--accent-glow);
  }

  /* Segmented Control Dynamics */
  .segment-btn {
    position: relative;
    z-index: 10;
    transition: color 0.25s ease;
  }
  .segment-slider {
    position: absolute;
    top: 3px;
    bottom: 3px;
    left: 3px;
    border-radius: 8px;
    background-color: var(--bg-card);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), width 0.3s ease;
    z-index: 1;
  }

  /* Premium Form Fields */
  .input-premium {
    background-color: var(--input-bg);
    border: 1px solid var(--border-color);
    color: var(--text-primary);
    transition: all 0.2s ease;
  }
  .input-premium:focus {
    border-color: var(--accent-color);
    box-shadow: 0 0 0 3px var(--accent-glow);
    background-color: var(--bg-card);
  }

  /* Static Height Matrix (Eliminates layout pops completely) */
  .locked-height-row {
    min-height: 74px;
    max-height: 74px;
  }

  /* Notification Bar */
  #action-toast {
    transform: translate(-50%, 100px);
    transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.25s ease;
    z-index: 100;
  }
  #action-toast.show {
    transform: translate(-50%, 0);
    opacity: 1;
  }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-6 md:p-8">

<!-- BACKGROUND ORNAMENTAL ACCENT GLOW -->
<div class="fixed top-1/4 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-[var(--accent-glow)] rounded-full blur-[120px] pointer-events-none transition-all duration-700"></div>

<div class="premium-card dynamic-accent-glow w-full max-w-xl rounded-2xl p-6 sm:p-8 relative overflow-hidden z-10">
  
  <!-- HEADER SECTION -->
  <header class="flex justify-between items-center mb-6 pb-5 border-b border-[var(--border-color)]">
    <div>
      <div class="flex items-center gap-2">
        <div class="w-2.5 h-2.5 rounded-full bg-[var(--accent-color)] shadow-sm animate-pulse transition-all duration-300"></div>
        <h1 class="text-lg font-bold tracking-tight text-[var(--text-primary)]">Notion Cashflow Pad</h1>
      </div>
      <p class="text-xs text-[var(--text-secondary)] mt-0.5" id="sync-status">Offline-saved & auto-synced with Notion</p>
    </div>
    
    <div class="flex items-center gap-2">
      <!-- Workspace Connection -->
      <a href="https://www.notion.so/30cc80c1bebe81819a92c98d09831f92" target="_blank" rel="noopener" class="text-xs font-semibold px-3 py-1.5 rounded-lg border border-[var(--border-color)] text-[var(--text-secondary)] hover:text-[var(--text-primary)] hover:bg-[var(--bg-inset)] transition-colors flex items-center gap-1.5">
        <i class="fa-brands fa-notion text-sm"></i>
        <span>Workspace</span>
      </a>
      
      <!-- Premium Dark/Light Switcher -->
      <button onclick="toggleTheme()" class="w-8 h-8 rounded-lg border border-[var(--border-color)] text-[var(--text-secondary)] hover:text-[var(--text-primary)] flex items-center justify-center hover:bg-[var(--bg-inset)] transition-colors" title="Change theme">
        <i id="theme-icon" class="fa-solid fa-moon text-xs"></i>
      </button>
    </div>
  </header>

  <!-- TRANSACTION SEGMENT CONTROLLER -->
  <div class="relative w-full h-[46px] rounded-xl bg-[var(--bg-inset)] p-[3px] flex items-center mb-6">
    <div class="segment-slider" id="type-slider"></div>
    
    <button type="button" onclick="switchTxType('Income', 0)" class="segment-btn flex-1 text-center font-bold text-xs py-2.5 text-[var(--accent-color)]" id="btn-inc">
      <i class="fa-solid fa-arrow-trend-up mr-1 text-[10px]"></i> Income
    </button>
    <button type="button" onclick="switchTxType('Expense', 1)" class="segment-btn flex-1 text-center font-bold text-xs py-2.5 text-[var(--text-secondary)] hover:text-[var(--text-primary)]" id="btn-exp">
      <i class="fa-solid fa-arrow-trend-down mr-1 text-[10px]"></i> Expense
    </button>
    <button type="button" onclick="switchTxType('Transfer', 2)" class="segment-btn flex-1 text-center font-bold text-xs py-2.5 text-[var(--text-secondary)] hover:text-[var(--text-primary)]" id="btn-trf">
      <i class="fa-solid fa-right-left mr-1 text-[10px]"></i> Transfer
    </button>
  </div>

  <!-- ENTRY INPUT FORM -->
  <form id="ledger-form" onsubmit="event.preventDefault(); submitLedgerEntry();">
    <!-- Row 1: Description -->
    <div class="flex flex-col gap-1.5 mb-4">
      <label for="f-desc" class="text-[10px] font-bold text-[var(--text-secondary)] uppercase tracking-wider">Transaction Description</label>
      <input type="text" id="f-desc" placeholder="e.g., Client Freelance Remuneration" autocomplete="off" class="input-premium w-full rounded-xl px-3.5 py-2.5 text-sm font-medium outline-none" required>
    </div>

    <!-- Row 2: Amount & Date -->
    <div class="grid grid-cols-2 gap-4 mb-4">
      <div class="flex flex-col gap-1.5">
        <label for="f-amount" class="text-[10px] font-bold text-[var(--text-secondary)] uppercase tracking-wider">Amount (€)</label>
        <div class="relative">
          <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-sm font-semibold text-[var(--text-secondary)]">€</span>
          <input type="number" id="f-amount" step="0.01" min="0.01" placeholder="0.00" class="input-premium w-full rounded-xl pl-8 pr-3.5 py-2.5 text-sm font-semibold outline-none" required>
        </div>
      </div>
      
      <div class="flex flex-col gap-1.5">
        <label for="f-date" class="text-[10px] font-bold text-[var(--text-secondary)] uppercase tracking-wider">Date of Log</label>
        <div class="relative">
          <input type="date" id="f-date" class="input-premium w-full rounded-xl px-3.5 py-2.5 text-sm outline-none font-medium" required>
        </div>
      </div>
    </div>

    <!-- Row 3: Height Locked Dropdowns to Prevent Layout Shift -->
    <div class="grid grid-cols-2 gap-4 mb-6 locked-height-row items-end">
      
      <!-- Slot 1: Dynamic Category Selector -->
      <div class="flex flex-col gap-1.5 h-full justify-end">
        <label id="lbl-slot1" for="f-slot1" class="text-[10px] font-bold text-[var(--text-secondary)] uppercase tracking-wider">Income Category</label>
        <select id="f-slot1" class="input-premium w-full rounded-xl px-3.5 py-2.5 text-sm font-medium outline-none cursor-pointer" required>
          <!-- Populated dynamically via JS -->
        </select>
      </div>

      <!-- Slot 2: Destination or Source Account selector -->
      <div class="flex flex-col gap-1.5 h-full justify-end">
        <label id="lbl-slot2" for="f-slot2" class="text-[10px] font-bold text-[var(--text-secondary)] uppercase tracking-wider">Bank Account</label>
        <select id="f-slot2" class="input-premium w-full rounded-xl px-3.5 py-2.5 text-sm font-medium outline-none cursor-pointer" required>
          <!-- Populated dynamically via JS -->
        </select>
      </div>

    </div>

    <!-- SUBMIT TRIGGER BUTTON -->
    <button type="submit" id="btn-submit" class="w-full bg-[var(--accent-color)] text-white font-bold py-3 px-4 rounded-xl shadow-md hover:brightness-105 active:scale-[0.99] transition-all flex items-center justify-center gap-2">
      <i class="fa-solid fa-circle-check"></i>
      <span id="submit-btn-text">Post Income to Notion</span>
    </button>
  </form>

  <!-- RECENT QUICK LOGS FEED -->
  <section class="mt-6 pt-5 border-t border-[var(--border-color)]">
    <div class="flex items-center justify-between mb-3">
      <span class="text-[10px] font-bold text-[var(--text-secondary)] uppercase tracking-wider">Recent Local Logs</span>
      <button onclick="clearLocalStorage()" class="text-[9px] font-bold text-red-500 hover:underline">Clear Feed</button>
    </div>
    <div id="recent-logs-feed" class="flex flex-col gap-2">
      <!-- Items added dynamically by JS -->
    </div>
  </section>

</div>

<!-- NOTIFICATION TOAST BAR -->
<div id="action-toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 opacity-0 bg-[var(--bg-card)] border border-[var(--border-color)] shadow-xl rounded-full px-5 py-2.5 flex items-center gap-2 pointer-events-none text-[var(--text-primary)]">
  <span id="toast-icon">✅</span>
  <span id="toast-message" class="text-xs font-semibold">Saved successfully</span>
</div>

<script>
// --- Configuration & Constants ---
const N8N_WEBHOOK_URL = 'http://localhost:5678/webhook/bb2520c4-0b7d-44e5-9f8b-e4a84a6db604';

// Databases matching user configurations
const INCOME_CATEGORIES = ['BETTING', 'BUSINESS', 'DIVIDEND', 'FREELANCE', 'GIFT', 'INTEREST', 'SALARY'];
const EXPENSE_CATEGORIES = [
  'BILLS', 'BUSINESS EXPENSES', 'DEBT PAYMENTS', 'EDUCATION', 'ENTERTAINMENT', 'FEES', 'FOOD', 
  'GAMBLING', 'GIFTS', 'HEALTHCARE', 'HOUSING', 'INSURANCE', 'INVESTMENTS', 'OTHER', 
  'PERSONAL CARE', 'SAVINGS', 'SHOPPING', 'SUBSCRIPTIONS', 'TRANSPORTATION', 'TRAVEL'
];
const ACCOUNTS = ['Cash', 'Klarna Bank', 'PayPal', 'Paysafe Card'];

// State Controllers
let currentType = 'Income';
let loggedFeed = JSON.parse(localStorage.getItem('quick_feed_notion')) || [];

// Window loaded state
window.onload = function() {
  // Set date field to today
  const today = new Date();
  document.getElementById('f-date').value = today.getFullYear() + '-' + 
    String(today.getMonth() + 1).padStart(2, '0') + '-' + 
    String(today.getDate()).padStart(2, '0');

  // Trigger base configuration build
  switchTxType('Income', 0);
  renderFeed();
};

// --- Custom Theme Handler ---
const THEME_KEY = 'cashflow-pad-theme';
function applyTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  const icon = document.getElementById('theme-icon');
  if (icon) {
    if (t === 'dark') {
      icon.className = 'fa-solid fa-sun text-xs';
    } else {
      icon.className = 'fa-solid fa-moon text-xs';
    }
  }
}
function toggleTheme(){
  const active = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  localStorage.setItem(THEME_KEY, active);
  applyTheme(active);
}
// Init system theme preferences
applyTheme(localStorage.getItem(THEME_KEY) || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));

// --- Dynamic Form Morphing ---
function switchTxType(type, index) {
  currentType = type;
  document.documentElement.setAttribute('data-active-type', type);

  // Position Segment Slide Highlight
  const slider = document.getElementById('type-slider');
  const segmentWidthPercentage = 100 / 3;
  slider.style.width = `calc(${segmentWidthPercentage}% - 6px)`;
  slider.style.transform = `translateX(calc(${index * 100}% + ${index * 3}px))`;

  // Segment Active States Updating
  const incBtn = document.getElementById('btn-inc');
  const expBtn = document.getElementById('btn-exp');
  const trfBtn = document.getElementById('btn-trf');

  incBtn.className = `segment-btn flex-1 text-center font-bold text-xs py-2.5 ${type === 'Income' ? 'text-[var(--accent-color)]' : 'text-[var(--text-secondary)] hover:text-[var(--text-primary)]'}`;
  expBtn.className = `segment-btn flex-1 text-center font-bold text-xs py-2.5 ${type === 'Expense' ? 'text-[var(--accent-color)]' : 'text-[var(--text-secondary)] hover:text-[var(--text-primary)]'}`;
  trfBtn.className = `segment-btn flex-1 text-center font-bold text-xs py-2.5 ${type === 'Transfer' ? 'text-[var(--accent-color)]' : 'text-[var(--text-secondary)] hover:text-[var(--text-primary)]'}`;

  // Swap dropdown configurations inside height-locked row
  const slot1Label = document.getElementById('lbl-slot1');
  const slot1Select = document.getElementById('f-slot1');
  const slot2Label = document.getElementById('lbl-slot2');
  const slot2Select = document.getElementById('f-slot2');

  slot1Select.innerHTML = '';
  slot2Select.innerHTML = '';

  if (type === 'Income') {
    slot1Label.textContent = "Income Category";
    INCOME_CATEGORIES.forEach(cat => {
      slot1Select.add(new Option(cat, cat));
    });

    slot2Label.textContent = "Deposit Account";
    ACCOUNTS.forEach(acc => {
      slot2Select.add(new Option(acc, acc));
    });
  } 
  else if (type === 'Expense') {
    slot1Label.textContent = "Expense Category";
    EXPENSE_CATEGORIES.forEach(cat => {
      slot1Select.add(new Option(cat, cat));
    });

    slot2Label.textContent = "Source Account";
    ACCOUNTS.forEach(acc => {
      slot2Select.add(new Option(acc, acc));
    });
  } 
  else if (type === 'Transfer') {
    slot1Label.textContent = "From Account";
    ACCOUNTS.forEach(acc => {
      slot1Select.add(new Option(acc, acc));
    });

    slot2Label.textContent = "To Account";
    ACCOUNTS.forEach(acc => {
      slot2Select.add(new Option(acc, acc));
    });
  }

  // Update Action submit button naming
  document.getElementById('submit-btn-text').textContent = `Post ${type} to Notion`;
}


// --- Handle Webhook & Submissions ---
function submitLedgerEntry() {
  const desc = document.getElementById('f-desc').value.trim();
  const amount = parseFloat(document.getElementById('f-amount').value);
  const date = document.getElementById('f-date').value;
  const val1 = document.getElementById('f-slot1').value;
  const val2 = document.getElementById('f-slot2').value;

  if (!desc || isNaN(amount) || amount <= 0 || !date) {
    showTriggerToast("Fill in description, amount & date first", "⚠️");
    return;
  }

  if (currentType === 'Transfer' && val1 === val2) {
    showTriggerToast("From & To accounts cannot be identical", "⚠️");
    return;
  }

  const submitBtn = document.getElementById('btn-submit');
  const submitText = document.getElementById('submit-btn-text');
  
  submitBtn.disabled = true;
  submitBtn.style.opacity = "0.7";
  submitText.textContent = "Broadcasting to Notion...";

  // Standard payload strictly matching user's n8n pipeline structure
  const timestamp = new Date().toISOString();
  const payload = {
    type: currentType,
    description: desc,
    amount: amount,
    date: date,
    timestamp: timestamp
  };

  if (currentType === 'Income') {
    payload.incomeCategory = val1;
    payload.account = val2;
  } else if (currentType === 'Expense') {
    payload.expenseCategory = val1;
    payload.account = val2;
  } else if (currentType === 'Transfer') {
    payload.fromAccount = val1;
    payload.toAccount = val2;
  }

  // Set transient loading states
  const syncStatus = document.getElementById('sync-status');
  syncStatus.textContent = "Syncing with Notion ledger...";
  syncStatus.className = "text-xs text-amber-500 mt-0.5 animate-pulse";

  fetch(N8N_WEBHOOK_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(res => {
    if (res.ok) {
      syncStatus.textContent = "Synchronized to Notion Workspace";
      syncStatus.className = "text-xs text-emerald-500 mt-0.5 font-semibold";
      showTriggerToast("Posted successfully!", "🚀");
      
      // Save locally to show dynamic feed stream
      saveLocalLog(payload);
      
      // Clear inputs
      document.getElementById('f-desc').value = '';
      document.getElementById('f-amount').value = '';
      document.getElementById('f-desc').focus();
    } else {
      throw new Error();
    }
  })
  .catch(() => {
    // If webhook is offline, cache locally so data is not lost
    syncStatus.textContent = "Preflight/Offline: Saved to Local Cache";
    syncStatus.className = "text-xs text-rose-500 mt-0.5 font-semibold";
    showTriggerToast("Preflight Blocked. Log saved locally.", "💾");
    saveLocalLog(payload);
  })
  .finally(() => {
    submitBtn.disabled = false;
    submitBtn.style.opacity = "1";
    submitText.textContent = `Post ${currentType} to Notion`;
  });
}

// --- Feed Cache Operations ---
function saveLocalLog(entry) {
  loggedFeed.unshift(entry);
  if(loggedFeed.length > 5) loggedFeed.pop(); // Keep to last 5 entries
  localStorage.setItem('quick_feed_notion', JSON.stringify(loggedFeed));
  renderFeed();
}

function renderFeed() {
  const feed = document.getElementById('recent-logs-feed');
  if (loggedFeed.length === 0) {
    feed.innerHTML = `<div class="text-xs text-center py-6 text-[var(--text-secondary)]">No entry has been logged yet this session</div>`;
    return;
  }

  feed.innerHTML = loggedFeed.map((e) => {
    let subDetail = "";
    let colorClass = "";
    let symb = "";
    
    if (e.type === 'Income') {
      subDetail = `${e.incomeCategory} ➔ ${e.account}`;
      colorClass = "text-emerald-500 dark:text-emerald-400";
      symb = "+";
    } else if (e.type === 'Expense') {
      subDetail = `${e.expenseCategory} ➔ ${e.account}`;
      colorClass = "text-rose-500 dark:text-rose-400";
      symb = "-";
    } else {
      subDetail = `${e.fromAccount} ➔ ${e.toAccount}`;
      colorClass = "text-indigo-500 dark:text-indigo-400";
    }

    const fmtDate = new Date(e.date).toLocaleDateString("en-GB", {day: "numeric", month: "short"});

    return `
      <div class="flex items-center justify-between p-3 rounded-xl border border-[var(--border-color)] bg-[var(--card-hover)] text-xs transition-colors hover:bg-[var(--bg-inset)]">
        <div class="flex items-center gap-2.5">
          <div class="font-bold text-[10px] uppercase text-[var(--text-secondary)] bg-[var(--bg-inset)] px-1.5 py-0.5 rounded">${fmtDate}</div>
          <div>
            <div class="font-bold text-[var(--text-primary)]">${e.description}</div>
            <div class="text-[10px] text-[var(--text-secondary)] font-medium">${subDetail}</div>
          </div>
        </div>
        <div class="text-right">
          <span class="font-bold font-mono ${colorClass}">${symb}€${parseFloat(e.amount).toFixed(2)}</span>
          <div class="text-[9px] text-[var(--text-secondary)]">${e.type}</div>
        </div>
      </div>
    `;
  }).join('');
}

function clearLocalStorage() {
  loggedFeed = [];
  localStorage.removeItem('quick_feed_notion');
  renderFeed();
  showTriggerToast("Recent memory cleared", "🧹");
}

// --- Dynamic Toast Modals ---
function showTriggerToast(message, icon) {
  const toast = document.getElementById('action-toast');
  document.getElementById('toast-icon').textContent = icon;
  document.getElementById('toast-message').textContent = message;
  
  toast.classList.add('show');
  setTimeout(() => {
    toast.classList.remove('show');
  }, 3000);
}
</script>
</body>
</html>
