<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger — New Entry</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#232B21;
    --ink-2:rgba(35,43,33,.66);
    --ink-3:rgba(35,43,33,.45);
    --page:#ECEDE2;
    --card:#FBFBF5;
    --menu:#FFFFFE;
    --raised:#EFF0E4;
    --line:#DCDECE;
    --line-strong:#B4BAA2;
    --green:#2E7A4C;
    --green-soft:#E2EFE4;
    --red:#B2432F;
    --red-soft:#F6E3DD;
    --brass:#96692E;
    --brass-soft:#F0E3C5;
    --shadow:0 18px 40px -20px rgba(20,28,17,.35);
    --menu-shadow:0 6px 16px -6px rgba(20,28,17,.18), 0 16px 40px -12px rgba(20,28,17,.28);
    --radius:12px;
    color-scheme:light;
  }
  html[data-theme="dark"]{
    --ink:#F1F3EA;
    --ink-2:rgba(241,243,234,.68);
    --ink-3:rgba(241,243,234,.46);
    --page:#131610;
    --card:#1C2118;
    --menu:#242A1F;
    --raised:#2F3627;
    --line:rgba(241,243,234,.12);
    --line-strong:rgba(241,243,234,.3);
    --green:#8FD2A8;
    --green-soft:rgba(143,210,168,.14);
    --red:#EC9B88;
    --red-soft:rgba(236,155,136,.14);
    --brass:#DDB578;
    --brass-soft:rgba(221,181,120,.16);
    --shadow:0 18px 40px -20px rgba(0,0,0,.65);
    --menu-shadow:0 6px 16px -6px rgba(0,0,0,.5), 0 18px 44px -12px rgba(0,0,0,.6);
    color-scheme:dark;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--page);
    color:var(--ink);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    font-size:15px;
    line-height:1.5;
    padding:40px 16px 60px;
    -webkit-font-smoothing:antialiased;
    transition:background .25s ease, color .25s ease;
  }
  .wrap{max-width:560px;margin:0 auto}

  /* ---------- Masthead ---------- */
  .masthead{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:22px;padding:0 4px}
  .eyebrow{font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);margin-bottom:6px}
  h1{font-family:'Fraunces',serif;font-size:25px;font-weight:600;letter-spacing:-.01em;color:var(--ink)}
  .mast-right{display:flex;align-items:center;gap:14px;padding-bottom:2px}
  .mast-right a{font-size:12.5px;color:var(--brass);text-decoration:none;font-weight:600;display:inline-flex;align-items:center;gap:4px;padding-bottom:2px;border-bottom:1px solid transparent;transition:border-color .15s}
  .mast-right a:hover{border-color:var(--brass)}
  .theme-btn{
    width:34px;height:34px;flex:none;
    display:inline-flex;align-items:center;justify-content:center;
    border:1px solid var(--line-strong);
    border-radius:50%;
    background:var(--card);
    color:var(--ink-2);
    cursor:pointer;
    transition:color .15s, border-color .15s, background .25s;
  }
  .theme-btn:hover{color:var(--brass);border-color:var(--brass)}
  .theme-btn:focus-visible{outline:2px solid var(--brass);outline-offset:2px}
  html[data-theme="dark"] .icon-moon{display:none}
  html:not([data-theme="dark"]) .icon-sun{display:none}

  /* ---------- Ticket ---------- */
  .ticket{
    position:relative;
    background:var(--card);
    border:1px solid var(--line-strong);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    overflow:hidden;
    transition:background .25s ease, border-color .25s ease;
  }
  .ticket::before{
    content:"";
    position:absolute;
    top:-1px;left:0;right:0;height:13px;
    background-image:radial-gradient(circle at 11px 0, var(--page) 7px, transparent 7.5px);
    background-size:22px 13px;
    background-repeat:repeat-x;
    z-index:2;
  }
  .ticket-inner{padding:26px 26px 24px}
  .step{
    font-family:'Space Mono',monospace;
    font-size:10.5px;
    font-weight:700;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--ink-3);
    margin-bottom:14px;
    display:flex;align-items:center;gap:8px;
  }
  .step::after{content:"";flex:1;height:1px;background:var(--line)}

  /* ---------- Type tabs ---------- */
  .types{display:flex;gap:8px;margin-bottom:22px}
  .type-btn{
    flex:1;
    min-height:54px;
    border:1px solid var(--line-strong);
    border-radius:9px;
    background:transparent;
    color:var(--ink-2);
    font-size:14px;
    font-weight:600;
    font-family:inherit;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:9px;
    transition:background .18s, border-color .18s, color .18s, transform .12s;
  }
  .type-btn .dot{width:7px;height:7px;border-radius:50%;background:currentColor;opacity:.45;transition:opacity .18s,transform .18s}
  .type-btn:hover{border-color:var(--ink-3)}
  .type-btn:active{transform:translateY(1px)}
  .type-btn.active .dot{opacity:1;transform:scale(1.35)}
  .type-btn.active[data-type="Income"]{background:var(--green-soft);border-color:var(--green);color:var(--green)}
  .type-btn.active[data-type="Expense"]{background:var(--red-soft);border-color:var(--red);color:var(--red)}
  .type-btn.active[data-type="Transfer"]{background:var(--brass-soft);border-color:var(--brass);color:var(--brass)}

  /* ---------- Ledger rows ---------- */
  #details{display:none;opacity:0;transform:translateY(8px);transition:opacity .3s ease,transform .3s ease}
  #details.show{display:block;opacity:1;transform:translateY(0)}

  .row{
    display:flex;
    align-items:flex-end;
    gap:16px;
    padding:14px 0;
    border-bottom:1px solid var(--line);
  }
  .row:first-of-type{padding-top:2px}
  .row .cols{display:flex;gap:20px;flex:1}
  .field{display:flex;flex-direction:column;gap:5px;flex:1;min-width:0}
  .field label{
    font-size:10.5px;
    font-weight:700;
    letter-spacing:.07em;
    text-transform:uppercase;
    color:var(--ink-3);
  }
  .field input{
    width:100%;
    border:none;
    border-bottom:1px solid transparent;
    background:transparent;
    color:var(--ink);
    font-family:inherit;
    font-size:15.5px;
    padding:4px 2px 6px;
    outline:none;
    transition:border-color .15s;
    appearance:none;
    -webkit-appearance:none;
    border-radius:0;
  }
  .field input::placeholder{color:var(--ink-3)}
  .field input:focus{border-bottom-color:var(--brass)}
  .field input[type="date"]{cursor:pointer}

  .field.amount .amt-wrap{display:flex;align-items:baseline;gap:6px}
  .field.amount .cur{font-family:'Space Mono',monospace;font-size:19px;color:var(--ink-3)}
  .field.amount input{
    font-family:'Space Mono',monospace;
    font-size:24px;
    font-weight:700;
    font-variant-numeric:tabular-nums;
    letter-spacing:-.01em;
    padding:2px 2px 4px;
  }

  .cond{display:none}
  .cond.show{display:flex}

  /* ---------- Custom dropdown ---------- */
  .dd{position:relative;width:100%}
  .dd select{display:none}
  .dd-trigger{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    background:transparent;
    border:none;
    border-bottom:1px solid transparent;
    color:var(--ink);
    font-family:inherit;
    font-size:15.5px;
    padding:4px 2px 6px;
    cursor:pointer;
    text-align:left;
    outline:none;
    transition:border-color .15s;
  }
  .dd-trigger .dd-value{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .dd-trigger.placeholder .dd-value{color:var(--ink-3)}
  .dd-trigger:hover .caret,.dd-trigger:focus-visible .caret{color:var(--brass)}
  .dd-trigger:focus-visible,.dd.open .dd-trigger{border-bottom-color:var(--brass)}
  .dd-trigger.error{border-bottom-color:var(--red)}
  .dd-trigger .caret{color:var(--ink-3);flex:none;transition:transform .18s,color .15s}
  .dd.open .caret{transform:rotate(180deg)}

  .dd-menu{
    position:fixed;
    z-index:1200;
    background:var(--menu);
    border:1px solid var(--line-strong);
    border-radius:10px;
    box-shadow:var(--menu-shadow);
    padding:6px;
    overflow-y:auto;
    display:none;
    max-width:min(92vw, 380px);
  }
  .dd-menu.show{display:block;animation:ddIn .14s ease}
  @keyframes ddIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  .dd-opt{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:9px 12px;
    border-radius:7px;
    font-size:14px;
    color:var(--ink);
    cursor:pointer;
    user-select:none;
  }
  .dd-opt.focused{background:var(--raised)}
  .dd-opt.selected{color:var(--green);font-weight:600}
  .dd-opt.selected::after{content:"✓";font-size:12px;flex:none}

  /* ---------- Submit ---------- */
  .actions{margin-top:22px}
  .submit-btn{
    width:100%;
    min-height:50px;
    background:var(--ink);
    color:var(--card);
    border:none;
    border-radius:9px;
    font-family:inherit;
    font-size:14.5px;
    font-weight:700;
    letter-spacing:.01em;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:9px;
    transition:background .18s, transform .12s;
  }
  .submit-btn:hover{background:var(--brass)}
  .submit-btn:active{transform:translateY(1px)}
  .submit-btn:disabled{background:var(--line);color:var(--ink-3);cursor:not-allowed;transform:none}
  .submit-btn .arrow{transition:transform .18s}
  .submit-btn:hover .arrow{transform:translateX(3px)}

  .spinner{
    display:none;
    width:16px;height:16px;
    border:2px solid rgba(255,255,255,.3);
    border-radius:50%;
    border-top-color:#fff;
    animation:spin .8s linear infinite;
  }
  .submit-btn:disabled .spinner{display:inline-block;border-color:var(--line-strong);border-top-color:var(--ink-3)}
  @keyframes spin{to{transform:rotate(360deg)}}

  .foot-note{
    text-align:center;
    font-family:'Space Mono',monospace;
    font-size:10.5px;
    letter-spacing:.06em;
    color:var(--ink-3);
    margin-top:18px;
    text-transform:uppercase;
  }

  /* ---------- Toast (receipt slip) ---------- */
  .toast{
    position:fixed;
    bottom:22px;
    left:50%;
    transform:translateX(-50%) translateY(250%);
    background:var(--card);
    color:var(--ink);
    border:1px solid var(--line-strong);
    border-top:2px dashed var(--line-strong);
    padding:13px 20px;
    border-radius:0 0 9px 9px;
    box-shadow:var(--shadow);
    display:flex;
    align-items:center;
    gap:10px;
    font-family:'Space Mono',monospace;
    font-size:12.5px;
    z-index:1000;
    transition:transform .35s cubic-bezier(.175,.885,.32,1.1);
    max-width:90vw;
  }
  .toast.show{transform:translateX(-50%) translateY(0)}
  .toast-dot{width:7px;height:7px;border-radius:50%;flex:none}
  .toast.success .toast-dot{background:var(--green)}
  .toast.error .toast-dot{background:var(--red)}

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;animation:none !important}
  }

  @media (max-width:480px){
    body{padding:28px 12px 48px}
    .types{flex-direction:column}
    .row .cols{flex-direction:column;gap:14px}
    h1{font-size:22px}
    .masthead{flex-wrap:wrap;align-items:center}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="masthead">
    <div>
      <div class="eyebrow">Account Ledger</div>
      <h1>New Entry</h1>
    </div>
    <div class="mast-right">
      <button id="theme-toggle" class="theme-btn" type="button" aria-label="Switch between light and dark theme" title="Switch light / dark">
        <svg class="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
        <svg class="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      </button>
      <a href="https://www.notion.so/30cc80c1bebe81819a92c98d09831f92" target="_blank" rel="noopener">
        Notion Workspace
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 11L11 1M11 1H3M11 1V9" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
    </div>
  </div>

  <div class="ticket">
    <div class="ticket-inner">

      <div class="step">1 · Choose type</div>
      <div class="types" role="group" aria-label="Transaction type">
        <button type="button" class="type-btn" data-type="Income"><span class="dot"></span>Income</button>
        <button type="button" class="type-btn" data-type="Expense"><span class="dot"></span>Expense</button>
        <button type="button" class="type-btn" data-type="Transfer"><span class="dot"></span>Transfer</button>
      </div>

      <form id="details-form">
        <div id="details">
          <div class="step" id="step2-label">2 · Line item details</div>

          <div class="row">
            <div class="field" style="flex:1">
              <label for="desc">Description</label>
              <input id="desc" type="text" placeholder="e.g. Groceries at Lidl" autocomplete="off" required>
            </div>
          </div>

          <div class="row">
            <div class="cols">
              <div class="field amount">
                <label for="amount">Amount</label>
                <div class="amt-wrap">
                  <span class="cur">€</span>
                  <input id="amount" type="number" min="0.01" step="0.01" placeholder="0.00" required>
                </div>
              </div>
              <div class="field">
                <label for="date">Date</label>
                <input id="date" type="date" required>
              </div>
            </div>
          </div>

          <!-- Conditional: Income Category -->
          <div class="row cond" data-for="Income">
            <div class="field">
              <label for="income-cat">Income Category</label>
              <select id="income-cat">
                <option value="">Select category…</option>
                <option>BETTING</option>
                <option>BUSINESS</option>
                <option>DIVIDEND</option>
                <option>FREELANCE</option>
                <option>GIFT</option>
                <option>INTEREST</option>
                <option>SALARY</option>
              </select>
            </div>
          </div>

          <!-- Conditional: Expense Category -->
          <div class="row cond" data-for="Expense">
            <div class="field">
              <label for="expense-cat">Expense Category</label>
              <select id="expense-cat">
                <option value="">Select category…</option>
                <option>BILLS</option>
                <option>BUSINESS EXPENSES</option>
                <option>DEBT PAYMENTS</option>
                <option>EDUCATION</option>
                <option>ENTERTAINMENT</option>
                <option>FEES</option>
                <option>FOOD</option>
                <option>GAMBLING</option>
                <option>GIFTS</option>
                <option>HEALTHCARE</option>
                <option>HOUSING</option>
                <option>INSURANCE</option>
                <option>INVESTMENTS</option>
                <option>OTHER</option>
                <option>PERSONAL CARE</option>
                <option>SAVINGS</option>
                <option>SHOPPING</option>
                <option>SUBSCRIPTIONS</option>
                <option>TRANSPORTATION</option>
                <option>TRAVEL</option>
              </select>
            </div>
          </div>

          <!-- Conditional: Account -->
          <div class="row cond" data-for="Income Expense">
            <div class="field">
              <label for="account" id="account-label">Bank Account</label>
              <select id="account">
                <option value="">Select account…</option>
                <option>Cash</option>
                <option>Klarna Bank</option>
                <option>PayPal</option>
                <option>Paysafe Card</option>
              </select>
            </div>
          </div>

          <!-- Conditional: Transfer From / To -->
          <div class="row cond" data-for="Transfer">
            <div class="cols">
              <div class="field">
                <label for="from-account">From Account</label>
                <select id="from-account">
                  <option value="">Select account…</option>
                  <option>Cash</option>
                  <option>Klarna Bank</option>
                  <option>PayPal</option>
                  <option>Paysafe Card</option>
                </select>
              </div>
              <div class="field">
                <label for="to-account">To Account</label>
                <select id="to-account">
                  <option value="">Select account…</option>
                  <option>Cash</option>
                  <option>Klarna Bank</option>
                  <option>PayPal</option>
                  <option>Paysafe Card</option>
                </select>
              </div>
            </div>
          </div>

          <div class="actions">
            <button type="submit" class="submit-btn" id="submit-btn" disabled>
              <span class="spinner"></span>
              <span id="btn-text">Select a Type First</span>
              <span class="arrow">→</span>
            </button>
          </div>
        </div>
      </form>

    </div>
  </div>

  <div class="foot-note">Synced to Notion via n8n</div>
</div>

<div id="toast-notification" class="toast">
  <div class="toast-dot"></div>
  <span id="toast-text"></span>
</div>

<script>
(function () {
  // Webhook URL configuration — unchanged, still posts to the same n8n endpoint
  const N8N_WEBHOOK_URL = 'http://localhost:5678/webhook/bb2520c4-0b7d-44e5-9f8b-e4a84a6db604';

  /* ---------- Theme (light is default, toggle remembers choice) ---------- */
  var rootEl = document.documentElement;
  var themeBtn = document.getElementById('theme-toggle');
  var savedTheme = null;
  try { savedTheme = localStorage.getItem('ledger-theme'); } catch (e) {}
  rootEl.setAttribute('data-theme', savedTheme === 'dark' ? 'dark' : 'light');
  themeBtn.addEventListener('click', function () {
    var next = rootEl.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    rootEl.setAttribute('data-theme', next);
    try { localStorage.setItem('ledger-theme', next); } catch (e) {}
  });

  /* ---------- Custom dropdowns (fully themed, replaces native popup) ---------- */
  var openDropdown = null;
  var dropdowns = [];

  function enhanceSelect(sel) {
    var wrap = document.createElement('div');
    wrap.className = 'dd';
    sel.parentNode.insertBefore(wrap, sel);
    wrap.appendChild(sel);

    var trig = document.createElement('button');
    trig.type = 'button';
    trig.className = 'dd-trigger placeholder';
    trig.id = sel.id + '-trigger';
    trig.setAttribute('aria-haspopup', 'listbox');
    trig.setAttribute('aria-expanded', 'false');
    trig.innerHTML = '<span class="dd-value"></span>' +
      '<svg class="caret" width="10" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M1 1l4 4 4-4" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    wrap.appendChild(trig);

    var field = wrap.closest('.field');
    var lbl = field ? field.querySelector('label') : null;
    if (lbl) lbl.setAttribute('for', trig.id);

    var menu = document.createElement('div');
    menu.className = 'dd-menu';
    menu.setAttribute('role', 'listbox');
    document.body.appendChild(menu);

    var opts = [];
    Array.prototype.forEach.call(sel.options, function (o) {
      if (o.value === '') return;
      var d = document.createElement('div');
      d.className = 'dd-opt';
      d.setAttribute('role', 'option');
      d.dataset.value = o.value;
      d.textContent = o.text;
      d.addEventListener('click', function () { choose(o.value); });
      d.addEventListener('mousemove', function () { setFocus(opts.indexOf(d)); });
      menu.appendChild(d);
      opts.push(d);
    });

    var focusIdx = -1;

    function sync() {
      var v = sel.value;
      var valEl = trig.querySelector('.dd-value');
      if (v) { valEl.textContent = v; trig.classList.remove('placeholder'); }
      else { valEl.textContent = sel.options[0].text; trig.classList.add('placeholder'); }
      opts.forEach(function (d) {
        var isSel = d.dataset.value === v && v !== '';
        d.classList.toggle('selected', isSel);
        d.setAttribute('aria-selected', isSel ? 'true' : 'false');
      });
    }

    function setFocus(i) {
      focusIdx = i;
      opts.forEach(function (d, j) { d.classList.toggle('focused', j === i); });
      if (i >= 0 && opts[i]) opts[i].scrollIntoView({ block: 'nearest' });
    }

    function position() {
      var r = trig.getBoundingClientRect();
      menu.style.minWidth = r.width + 'px';
      var below = window.innerHeight - r.bottom - 14;
      if (below < 170 && r.top > window.innerHeight - r.bottom) {
        menu.style.maxHeight = Math.min(300, r.top - 14) + 'px';
        menu.style.top = 'auto';
        menu.style.bottom = (window.innerHeight - r.top + 6) + 'px';
      } else {
        menu.style.maxHeight = Math.min(300, below) + 'px';
        menu.style.bottom = 'auto';
        menu.style.top = (r.bottom + 6) + 'px';
      }
      menu.style.left = Math.max(8, Math.min(r.left, window.innerWidth - menu.offsetWidth - 8)) + 'px';
    }

    function open() {
      if (openDropdown && openDropdown !== api) openDropdown.close();
      menu.classList.add('show');
      wrap.classList.add('open');
      trig.setAttribute('aria-expanded', 'true');
      position();
      var selIdx = 0;
      opts.forEach(function (d, j) { if (d.classList.contains('selected')) selIdx = j; });
      setFocus(selIdx);
      openDropdown = api;
    }

    function close() {
      menu.classList.remove('show');
      wrap.classList.remove('open');
      trig.setAttribute('aria-expanded', 'false');
      if (openDropdown === api) openDropdown = null;
    }

    function choose(v) {
      sel.value = v;
      trig.classList.remove('error');
      sync();
      close();
      trig.focus();
    }

    trig.addEventListener('click', function () {
      if (menu.classList.contains('show')) { close(); } else { open(); }
    });

    trig.addEventListener('keydown', function (e) {
      var isOpen = menu.classList.contains('show');
      if (!isOpen && (e.key === 'ArrowDown' || e.key === 'ArrowUp' || e.key === 'Enter' || e.key === ' ')) {
        e.preventDefault(); open(); return;
      }
      if (!isOpen) return;
      if (e.key === 'ArrowDown') { e.preventDefault(); setFocus(Math.min(opts.length - 1, focusIdx + 1)); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); setFocus(Math.max(0, focusIdx - 1)); }
      else if (e.key === 'Home') { e.preventDefault(); setFocus(0); }
      else if (e.key === 'End') { e.preventDefault(); setFocus(opts.length - 1); }
      else if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); if (focusIdx >= 0) choose(opts[focusIdx].dataset.value); }
      else if (e.key === 'Escape') { e.preventDefault(); close(); }
      else if (e.key === 'Tab') { close(); }
    });

    var api = {
      sel: sel, trig: trig, menu: menu, wrap: wrap,
      close: close,
      reset: function () { sel.value = ''; trig.classList.remove('error'); sync(); },
      isVisible: function () {
        var c = wrap.closest('.row.cond');
        return !c || c.classList.contains('show');
      }
    };
    sync();
    dropdowns.push(api);
  }

  document.querySelectorAll('.field select').forEach(enhanceSelect);

  document.addEventListener('mousedown', function (e) {
    if (!openDropdown) return;
    if (openDropdown.wrap.contains(e.target) || openDropdown.menu.contains(e.target)) return;
    openDropdown.close();
  });
  window.addEventListener('resize', function () { if (openDropdown) openDropdown.close(); });
  window.addEventListener('scroll', function (e) {
    if (!openDropdown) return;
    // Ignore scrolling that happens inside the dropdown list itself
    if (openDropdown.menu.contains(e.target)) return;
    openDropdown.close();
  }, true);

  /* ---------- Form logic ---------- */
  var state = { type: null };
  var typeBtns = document.querySelectorAll('.type-btn');
  var details = document.getElementById('details');
  var conds = document.querySelectorAll('.cond');
  var form = document.getElementById('details-form');
  var submitBtn = document.getElementById('submit-btn');
  var btnText = document.getElementById('btn-text');

  var inputs = {
    desc: document.getElementById('desc'),
    amount: document.getElementById('amount'),
    date: document.getElementById('date'),
    incomeCat: document.getElementById('income-cat'),
    expenseCat: document.getElementById('expense-cat'),
    account: document.getElementById('account'),
    fromAccount: document.getElementById('from-account'),
    toAccount: document.getElementById('to-account')
  };

  // Default date to today
  var t = new Date();
  inputs.date.value = t.getFullYear() + '-' + String(t.getMonth() + 1).padStart(2, '0') + '-' + String(t.getDate()).padStart(2, '0');

  typeBtns.forEach(function (btn) {
    btn.addEventListener('click', function () {
      state.type = btn.dataset.type;
      if (openDropdown) openDropdown.close();

      typeBtns.forEach(function (b) { b.classList.toggle('active', b === btn); });

      conds.forEach(function (c) {
        var showForTypes = c.dataset.for.split(' ');
        var isVisible = showForTypes.indexOf(state.type) !== -1;
        c.classList.toggle('show', isVisible);
      });

      document.getElementById('account-label').textContent = state.type === 'Income' ? 'To Account (Bank Account)' : 'Bank Account';

      details.classList.add('show');
      submitBtn.disabled = false;
      btnText.textContent = 'Post ' + state.type + ' Entry';
    });
  });

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    if (!state.type) return;

    // Validate visible dropdowns (native selects are hidden, so validate manually)
    var firstBad = null;
    dropdowns.forEach(function (d) {
      if (d.isVisible() && !d.sel.value) {
        d.trig.classList.add('error');
        if (!firstBad) firstBad = d;
      }
    });
    if (firstBad) {
      showToast('Fill in the highlighted fields first', 'error');
      firstBad.trig.focus();
      return;
    }

    submitBtn.disabled = true;
    btnText.textContent = 'Posting…';

    var payload = {
      type: state.type,
      description: inputs.desc.value.trim(),
      amount: parseFloat(inputs.amount.value),
      date: inputs.date.value,
      timestamp: new Date().toISOString()
    };

    if (state.type === 'Income') {
      payload.incomeCategory = inputs.incomeCat.value;
      payload.account = inputs.account.value;
    } else if (state.type === 'Expense') {
      payload.expenseCategory = inputs.expenseCat.value;
      payload.account = inputs.account.value;
    } else if (state.type === 'Transfer') {
      payload.fromAccount = inputs.fromAccount.value;
      payload.toAccount = inputs.toAccount.value;
    }

    try {
      const response = await fetch(N8N_WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (response.ok) {
        showToast('Posted to the Notion ledger', 'success');

        inputs.desc.value = '';
        inputs.amount.value = '';
        dropdowns.forEach(function (d) { d.reset(); });

        inputs.desc.focus();
      } else {
        throw new Error('Server returned status: ' + response.status);
      }
    } catch (err) {
      console.error(err);
      showToast('Connection lost — entry not posted', 'error');
    } finally {
      submitBtn.disabled = false;
      btnText.textContent = 'Post ' + state.type + ' Entry';
    }
  });

  var toastTimer;
  function showToast(message, type) {
    var toast = document.getElementById('toast-notification');
    var toastText = document.getElementById('toast-text');

    toast.className = 'toast ' + type;
    toastText.textContent = message;

    toast.classList.add('show');

    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () {
      toast.classList.remove('show');
    }, 4500);
  }
})();
</script>
</body>
</html>
